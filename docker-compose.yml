services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  admin-api:
    build: ./admin-api
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:8001:8001"   # только локально, наружу — через Nginx
    depends_on:
      postgres:
        condition: service_healthy

  admin-frontend:
    build: ./admin-frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"     # только локально, наружу — через Nginx
    depends_on:
      - admin-api

volumes:
  pg_data: